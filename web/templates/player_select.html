{% extends "base.html" %}
{% block title %}选择球员{% endblock %}
{% block content %}
<div class="page-wrap">
  <div class="page-header">
    <h1>选择球员</h1>
    <a class="btn btn-ghost" href="/">← 返回</a>
  </div>

  <form class="search-bar" method="get">
    <input name="q" value="{{ q }}" placeholder="搜索球员姓名（如 LeBron、Curry）" autofocus>
    <button type="submit" class="btn btn-primary">搜索</button>
  </form>

  <div class="player-grid">
    {% for p in players %}
    <div class="player-card-item">
      <div class="pcardtop">
        <span class="pos-badge">{{ p.pos }}</span>
        <span class="overall-num">{{ p.overall }}</span>
      </div>
      <div class="pcard-name">{{ p.name }}</div>
      <form method="post" action="/new/{{ p.id }}">
        <button type="submit" class="btn btn-small">选择此球员</button>
      </form>
    </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
